spring.application.name=auth-service
server.port=8082

# This property is managed by each profile.
spring.config.import=optional:configserver:

# spring boot actuator
management.endpoints.web.exposure.include=health,info

management.info.env.enabled=true
info.app.name=auth-service
info.app.description=Service responsible for user authentication and token management
info.app.version=1.0.0

# spring cloud config-server
spring.cloud.config.discovery.enabled=true
spring.cloud.config.discovery.serviceId=config-server

# Eureka
eureka.instance.hostname=auth-service
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# JWT - https://asecuritysite.com/encryption/plain - key size 256 bit
jwt.secret=${JWT_SECRET}

# Database
spring.datasource.url=jdbc:mysql://mysql:3306/wallet
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=digitalmoneyhouse.app@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=smtp

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
#spring.mail.properties.mail.debug=true

# Email - Reset Password
frontend.reset-password-url=http://localhost:5173/reset-password
