spring:
  application:
    name: card-service
  datasource:
    url: jdbc:mysql://localhost:3306/wallet_test
    username: root
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/