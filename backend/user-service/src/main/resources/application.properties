spring.application.name=user-service
server.port=8084

# spring boot actuator
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true
info.app.name=user-service
info.app.description=Manages users and authentication
info.app.version=1.0.0

# Config Server via Eureka
spring.cloud.config.discovery.enabled=true
spring.cloud.config.discovery.serviceId=config-server

# Eureka
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.hostname=user-service

# Feign
spring.cloud.openfeign.enabled=true

# Database
spring.datasource.url=jdbc:mysql://mysql:3306/wallet
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# data.sql - roles
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true